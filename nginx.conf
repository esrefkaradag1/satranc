server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location /api/chesscom-puzzle {
        proxy_pass https://www.chess.com/callback/puzzle/tactics/$arg_id;
        proxy_ssl_server_name on;
        proxy_set_header Host www.chess.com;
    }

    location /api/chesscom-member-stats {
        proxy_pass https://www.chess.com/callback/member/stats/puzzles/$arg_username?type=$arg_type;
        proxy_ssl_server_name on;
        proxy_set_header Host www.chess.com;
    }

    location /api/chesscom-recent-puzzles {
        proxy_pass https://www.chess.com/callback/stats/tactics2/new/puzzles/$arg_username;
        proxy_ssl_server_name on;
        proxy_set_header Host www.chess.com;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
