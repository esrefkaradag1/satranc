name: Prepare Deploy Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish-deploy-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: |
          npm ci --ignore-scripts
          npm run sync:stockfish
          npm run build

      - name: Create deploy bundle
        run: |
          mkdir -p deploy-bundle/server deploy-bundle/lib
          cp -r dist deploy-bundle/dist
          cp package.json package-lock.json deploy-bundle/
          cp server/docker-api.mjs server/docker-production.mjs deploy-bundle/server/
          cp lib/*.mjs deploy-bundle/lib/
          cat > deploy-bundle/Dockerfile <<'EOF'
          FROM node:22-alpine

          RUN apk add --no-cache wget

          WORKDIR /app

          COPY package.json package-lock.json ./
          RUN npm ci --omit=dev --ignore-scripts

          COPY server/docker-api.mjs server/docker-production.mjs /app/server/
          COPY lib/*.mjs /app/lib/
          COPY dist /app/dist

          ENV STATIC_DIR=/app/dist
          ENV PORT=3000
          ENV HOST=0.0.0.0

          EXPOSE 3000

          HEALTHCHECK --interval=30s --timeout=5s --start-period=10s --retries=3 \
            CMD wget -qO- http://127.0.0.1:3000/health || exit 1

          CMD ["node", "/app/server/docker-production.mjs"]
          EOF
          cat > deploy-bundle/.dockerignore <<'EOF'
          .git
          EOF

      - name: Push deploy branch
        run: |
          cd deploy-bundle
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy bundle for Dokploy"
          git branch -M deploy
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" deploy
